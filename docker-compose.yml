services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sistema-calificacion-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
